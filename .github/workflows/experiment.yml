name: experiment

# 仮説検証ハーネス (R4): フルネット環境で実データ実験を回し、結果をブランチにコミットする。
# 手動起動 (workflow_dispatch)。0円（GitHub Actions 無料枠 / パブリックリポは無制限）。

# push 起動: 実験ロジック/要素を変更したらフルネットで自動再検証する。
# 結果コミットは GITHUB_TOKEN によるため再帰トリガーされない（GitHub 仕様）。
on:
  workflow_dispatch:
    inputs:
      sample:
        description: "サンプル銘柄数 (0=全銘柄)"
        required: false
        default: "500"
      seed:
        description: "乱数シード"
        required: false
        default: "42"
  push:
    branches:
      - claude/jp-stock-doubling-analyzer-LcMHc
    paths:
      - "experiments/**"
      - "src/stockfactor/**"
      - ".github/workflows/experiment.yml"

permissions:
  contents: write

jobs:
  experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: exp01 feasibility
        run: python experiments/exp01_data_feasibility.py || true

      - name: refresh universe (JPX)
        run: |
          python -c "from stockfactor import universe; df=universe.refresh(); print('universe rows', len(df))" || true

      - name: run experiment
        env:
          SAMPLE: ${{ github.event.inputs.sample || '500' }}
          SEED: ${{ github.event.inputs.seed || '42' }}
        run: |
          python experiments/run_experiment.py --sample "$SAMPLE" --seed "$SEED"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/universe.csv experiments/results/ || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "exp: update experiment results [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
